services:
  - type: web
    name: aliraah-api
    runtime: node
    plan: free
    region: ohio
    branch: main
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # Secrets — set these in the Render dashboard (never commit them).
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_TOKEN
        sync: false
      # Comma-separated allowed browser origins (your Vercel + custom domain).
      - key: CORS_ORIGINS
        sync: false
      # Optional Google Business reviews:
      - key: GOOGLE_API_KEY
        sync: false
      - key: GOOGLE_PLACE_ID
        sync: false
